# Static resource locations (Spring Boot serves /static by default). Keep defaults but explicit for clarity.
spring.web.resources.static-locations=classpath:/static/

# Disable caching for static resources during development (set to true in production)
spring.web.resources.cache.cachecontrol.max-age=0
